<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Advanced AI Deepfake Voice Detector - Detect manipulated audio with 94% accuracy">
    <meta name="keywords" content="deepfake, voice detection, AI, security, audio analysis">
    <meta name="author" content="DeepGuard AI">
    <title>{% block title %}DeepGuard AI - Deepfake Voice Detector{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
</head>
<body>

<div class="animated-bg"></div>

<!-- Navigation Bar -->
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">
            <span class="logo-icon">🎙️</span>
            <span class="logo-text">DeepGuard<span class="logo-highlight">AI</span></span>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('index') }}" class="{% block home_active %}{% endblock %}">Home</a></li>
            <li><a href="{{ url_for('history') }}" class="{% block history_active %}{% endblock %}">History</a></li>
            <li><a href="{{ url_for('about') }}" class="{% block about_active %}{% endblock %}">About</a></li>
        </ul>
        <div class="nav-status">
            <span class="status-dot"></span>
            <span>System Active</span>
        </div>
        <div class="mobile-menu-btn" id="mobileMenuBtn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
    <ul>
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('history') }}">History</a></li>
        <li><a href="{{ url_for('about') }}">About</a></li>
    </ul>
</div>

<!-- Main Content Container -->
<main class="main-content">
    {% block content %}{% endblock %}
</main>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
        <div class="loading-spinner"></div>
        <h3>Analyzing Audio</h3>
        <p>Our AI is processing your file...</p>
        <div class="loading-progress">
            <div class="progress-bar"></div>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div class="toast-notification" id="toastNotification">
    <span class="toast-icon"></span>
    <span class="toast-message"></span>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
// Mobile Menu Toggle
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mobileMenu = document.getElementById('mobileMenu');

if (mobileMenuBtn && mobileMenu) {
    mobileMenuBtn.addEventListener('click', function() {
        mobileMenu.classList.toggle('active');
        this.classList.toggle('active');
        
        const spans = this.querySelectorAll('span');
        if (this.classList.contains('active')) {
            spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
            spans[1].style.opacity = '0';
            spans[2].style.transform = 'rotate(-45deg) translate(7px, -6px)';
        } else {
            spans[0].style.transform = 'none';
            spans[1].style.opacity = '1';
            spans[2].style.transform = 'none';
        }
    });
    
    // Close mobile menu on link click
    document.querySelectorAll('.mobile-menu a').forEach(link => {
        link.addEventListener('click', () => {
            mobileMenu.classList.remove('active');
            if (mobileMenuBtn) mobileMenuBtn.classList.remove('active');
            const spans = mobileMenuBtn.querySelectorAll('span');
            spans[0].style.transform = 'none';
            spans[1].style.opacity = '1';
            spans[2].style.transform = 'none';
        });
    });
}

// Close mobile menu on window resize
window.addEventListener('resize', function() {
    if (window.innerWidth > 768) {
        if (mobileMenu) mobileMenu.classList.remove('active');
        if (mobileMenuBtn) mobileMenuBtn.classList.remove('active');
    }
});
</script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
